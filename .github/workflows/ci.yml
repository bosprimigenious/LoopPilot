name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Bootstrap local directories
        run: python scripts/bootstrap_local.py --dry-run

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q

      - name: Doctor
        run: loop-pilot doctor

      - name: Adapter CLI
        run: |
          loop-pilot adapters list
          loop-pilot adapters doctor

      - name: Adapter unit tests
        run: |
          pytest tests/unit/test_adapter_gating.py tests/unit/test_tool_broker_policy.py tests/unit/test_secret_redaction.py tests/unit/test_adapter_router.py -q

      - name: Adapter integration tests
        run: |
          pytest tests/integration/test_adapter_blocked_by_default.py tests/integration/test_cursor_adapter_contract.py tests/integration/test_openai_compatible_adapter_contract.py -q

      - name: Mini dry-run runs
        run: |
          loop-pilot run intern --fixture simple_python_bug --dry-run
          loop-pilot run paper --fixture unsupported_claim --dry-run
          loop-pilot run daily-news --fixture github_star_snapshots --dry-run
          loop-pilot run all --fixture-set mini --dry-run

      - name: Practical MVP demo dry-run runs
        run: |
          loop-pilot run intern --workspace examples/intern_demo --dry-run
          loop-pilot run paper --workspace examples/paper_demo --dry-run
          loop-pilot run daily-news --source-profile demo --dry-run
