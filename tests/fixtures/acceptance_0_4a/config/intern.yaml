enabled: true
workspace: workspaces/intern-fixture
default_branch: main
use_worktree: true
allowed_paths: ["src/**", "tests/**"]
forbidden_paths: [".env*", "secrets/**", "deploy/**"]
validation:
  test: ["python", "-m", "pytest", "-q"]
  lint: null
  typecheck: null
  build: null
budget:
  max_duration_minutes: 30
  max_rounds: 3
  max_model_calls: 8
  max_changed_files: 5
permissions:
  allow_commit: false
  allow_push: false
  allow_dependency_changes: false
